on:
  workflow_dispatch:

jobs:
  hello_world_job:
    runs-on: ubuntu-latest
    name: A job to say hello
    steps:
      - uses: actions/checkout@v4
      - id: foo
        uses: OWNER/REPONAME/ACTION_FOLDER@BRANCH_NAME #⬅️ Change this 
        with:
          who-to-greet: <ENTER_YOUR_NAME> #⬅️ Note
      - run: echo random-number "$RANDOM_NUMBER"
        shell: bash
        env:
          RANDOM_NUMBER: ${{ steps.foo.outputs.random-number }}